<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean dark background -->
  <rect width="256" height="256" fill="#1a1a1e" rx="48"/>

  <!-- LS Monogram - modern, geometric -->
  <g font-family="SF Pro Display, -apple-system, sans-serif" font-weight="700" font-size="140" letter-spacing="-8">
    <!-- L in blue -->
    <text x="45" y="185" fill="#5ba3ff">L</text>

    <!-- S in purple -->
    <text x="155" y="185" fill="#a855f7">S</text>
  </g>

  <!-- Subtle accent line underneath -->
  <line x1="50" y1="210" x2="200" y2="210" stroke="#5ba3ff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
</svg>